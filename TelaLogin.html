<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
    <nav class="max-w-7xl mx-auto px-6 py-4">

        <div class="flex justify-between items-center">

            <!-- Logo -->
            <a href="./index.html" class="flex items-center gap-3">
                <i class="fa-solid fa-seedling text-2xl text-green-700"></i>
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-gray-400">
                        Prefeitura Municipal
                    </p>
                    <p class="text-lg font-extrabold text-green-800 leading-tight">
                        Secretaria de Meio Ambiente
                    </p>
                </div>
            </a>

            <!-- Botão Mobile -->
            <button id="menuBtn"
                class="md:hidden text-2xl text-green-800">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Menu Desktop -->
            <ul class="hidden md:flex items-center gap-10">

                <li>
                    <a href="./mapa.html"
                        class="flex flex-col items-center text-center text-gray-600 hover:text-green-700 transition group">
                        <i class="fa-solid fa-map-location-dot text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                        <span class="font-semibold">Coleta de Lixo</span>
                    </a>
                </li>

                <li>
                    <a href="./TelaLogin.html"
                        class="flex flex-col items-center text-center text-gray-600 hover:text-green-700 transition group">
                        <i class="fa-solid fa-file-signature text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                        <span class="font-semibold">Pedir Serviços</span>
                    </a>
                </li>

                <li>
                    <a href="./denuncia.html"
                        class="flex flex-col items-center text-center text-gray-600 hover:text-red-600 transition group">
                        <i class="fa-solid fa-bullhorn text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                        <span class="font-semibold">Fazer Denúncia</span>
                    </a>
                </li>

            </ul>

        </div>

        <!-- Menu Mobile -->
        <div id="mobileMenu" class="hidden md:hidden mt-6">

            <ul class="flex flex-col gap-5">

                <li>
                    <a href="./mapa.html"
                        class="flex items-center gap-4 p-3 rounded-lg hover:bg-green-50">
                        <i class="fa-solid fa-map-location-dot text-xl text-green-700"></i>
                        <span class="font-semibold">Ver Rota do Carro do Lixo</span>
                    </a>
                </li>

                <li>
                    <a href="./solicitacao.html"
                        class="flex items-center gap-4 p-3 rounded-lg hover:bg-green-50">
                        <i class="fa-solid fa-file-signature text-xl text-green-700"></i>
                        <span class="font-semibold">Pedir Serviços</span>
                    </a>
                </li>

                <li>
                    <a href="./denuncia.html"
                        class="flex items-center gap-4 p-3 rounded-lg hover:bg-red-50">
                        <i class="fa-solid fa-bullhorn text-xl text-red-600"></i>
                        <span class="font-semibold">Fazer uma Denúncia</span>
                    </a>
                </li>

            </ul>

        </div>

    </nav>
</header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-lg shadow-lg overflow-hidden">
            
            <div class="bg-[#0f172a] text-white p-6 text-center sm:text-left">
                <h2 class="text-xl font-semibold mb-2">Entrar na sua conta</h2>
                <p class="text-sm text-slate-400 leading-relaxed">
                    Informe seu CPF e senha para acessar suas solicitações e processos.
                </p>
            </div>
            
            <form id="loginForm" class="p-6 space-y-5">
                
                <div>
                    <label for="cpf" class="block text-sm font-semibold text-slate-800 mb-1.5">
                        CPF *
                    </label>
                    <input 
                        type="text" 
                        id="cpf" 
                        name="cpf"
                        maxlength="14"
                        placeholder="000.000.000-00"
                        required
                        class="w-full px-3.5 py-2.5 border border-slate-300 rounded-md outline-none text-slate-700 bg-slate-50 transition-all focus:border-[#00875a] focus:bg-white focus:ring-4 focus:ring-[#00875a]/15"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-800 mb-1.5">
                        Senha *
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Digite sua senha"
                            required
                            class="w-full pl-3.5 pr-10 py-2.5 border border-slate-300 rounded-md outline-none text-slate-700 bg-slate-50 transition-all focus:border-[#00875a] focus:bg-white focus:ring-4 focus:ring-[#00875a]/15"
                        >
                        <i id="togglePassword" class="fa-solid fa-eye absolute right-3.5 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-slate-600 transition-colors"></i>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 pt-2">
                    <a href="#" class="text-sm font-medium text-[#00875a] hover:underline">
                        Esqueceu sua senha?
                    </a>
                    <button 
                        type="submit" 
                        class="w-full sm:w-auto bg-[#00875a] hover:bg-[#006d48] text-white font-semibold px-6 py-2.5 rounded-md transition-colors shadow-sm"
                    >
                        Entrar
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cpfInput = document.getElementById('cpf');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const loginForm = document.getElementById('loginForm');

            // Máscara simples para CPF (Apenas números formatados em 000.000.000-00)
            cpfInput.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 11) value = value.slice(0, 11);
                
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                
                e.target.value = value;
            });

            // Alternar visibilidade da senha
            togglePassword.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                
                togglePassword.classList.toggle('fa-eye');
                togglePassword.classList.toggle('fa-eye-slash');
            });

            // Processamento do Envio
            loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const cleanCpf = cpfInput.value.replace(/\D/g, '');

    if (cleanCpf.length !== 11) {
        alert('Por favor, insira um CPF válido com 11 dígitos.');
        return;
    }

    // Redireciona para outra página
    window.location.href = './solicitacao.html';
});
        });
    </script>
    <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");
    const icon = menuBtn.querySelector("i");

    menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");

        if (mobileMenu.classList.contains("hidden")) {
            icon.classList.remove("fa-xmark");
            icon.classList.add("fa-bars");
        } else {
            icon.classList.remove("fa-bars");
            icon.classList.add("fa-xmark");
        }
    });
</script>
</body>
</html>
